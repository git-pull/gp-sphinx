<script data-cfasync="false">
(() => {
  const sidebar = document.getElementById("sidebar-projects");
  const loc = window.location;
  const entries = Array.from(sidebar.querySelectorAll("a[href]"), (link) => {
    const url = new URL(link.href, loc.origin);
    const path = url.pathname.replace(/\/+$/, "");
    const sameHost = url.hostname === loc.hostname;
    // Links with a pathname: match origin + path prefix (e.g. /pytest-plugin/)
    // Links without: match hostname only (e.g. https://libtmux.git-pull.com)
    const isActive = path
      ? sameHost && loc.pathname.startsWith(path)
      : sameHost;
    return { link, path, isActive };
  });
  // A sub-site link outranks its bare-host parent, so visiting
  // /packages/django-admin-search-query/ marks (admin) alone, not both it and
  // django-search-query. Only the deepest matching path is kept.
  const depth = Math.max(
    0,
    ...entries.filter((e) => e.isActive).map((e) => e.path.length),
  );
  entries.forEach(({ link, path, isActive }) => {
    if (isActive && path.length >= depth && !link.classList.contains("active")) {
      const d = document.createElement('span');
      d.textContent = link.textContent;
      d.classList.add("active");
      link.parentNode.replaceChild(d, link);
    }
  });
  sidebar.classList.add('ready');
})()
</script>
