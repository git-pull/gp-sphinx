[project]
name = "gp-sphinx"
version = "0.0.1"
description = "Shared Sphinx documentation platform for git-pull projects"
requires-python = ">=3.10,<4.0"
authors = [
  {name = "Tony Narlock", email = "tony@git-pull.com"}
]
license = { text = "MIT" }
classifiers = [
  "Development Status :: 3 - Alpha",
  "License :: OSI Approved :: MIT License",
  "Environment :: Web Environment",
  "Framework :: Sphinx",
  "Framework :: Sphinx :: Theme",
  "Intended Audience :: Developers",
  "Operating System :: POSIX",
  "Operating System :: MacOS :: MacOS X",
  "Programming Language :: Python",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Topic :: Documentation",
  "Topic :: Documentation :: Sphinx",
  "Topic :: Utilities",
]
packages = [
  { include = "gp_sphinx", from = "src" },
]
include = [
  { path = "tests", format = "sdist" },
]
readme = "README.md"
keywords = ["sphinx", "documentation", "theme", "furo"]
homepage = "https://gp-sphinx.git-pull.com"
dependencies = [
  "sphinx<9",
  "furo",
  "myst-parser",
  "docutils",
  "sphinx-autodoc-typehints",
  "sphinx-inline-tabs",
  "sphinx-copybutton",
  "sphinxext-opengraph",
  "sphinxext-rediraffe",
  "sphinx-design",
  "linkify-it-py",
  "gp-libs",
]

[project.urls]
"Bug Tracker" = "https://github.com/git-pull/gp-sphinx/issues"
Documentation = "https://gp-sphinx.git-pull.com"
Repository = "https://github.com/git-pull/gp-sphinx"
Changes = "https://github.com/git-pull/gp-sphinx/blob/master/CHANGES"

[dependency-groups]
dev = [
  # Docs
  "sphinx<9",
  "furo",
  "gp-sphinx",
  "sphinx-autobuild",
  "sphinx-autodoc-typehints",
  "sphinx-inline-tabs",
  "sphinxext-opengraph",
  "sphinx-copybutton",
  "sphinxext-rediraffe",
  "sphinx-design",
  "myst-parser",
  "linkify-it-py",
  # Testing
  "pytest",
  "pytest-rerunfailures",
  "pytest-mock",
  "pytest-watcher",
  # Coverage
  "codecov",
  "coverage",
  "pytest-cov",
  # Lint
  "ruff",
  "mypy",
  "typing-extensions",
  "types-docutils",
]

docs = [
  "sphinx<9",
  "furo",
  "gp-sphinx",
  "sphinx-autobuild",
  "sphinx-autodoc-typehints",
  "sphinx-inline-tabs",
  "sphinxext-opengraph",
  "sphinx-copybutton",
  "sphinxext-rediraffe",
  "sphinx-design",
  "myst-parser",
  "linkify-it-py",
]
testing = [
  "pytest",
  "pytest-rerunfailures",
  "pytest-mock",
  "pytest-watcher",
]
coverage = [
  "codecov",
  "coverage",
  "pytest-cov",
]
lint = [
  "ruff",
  "mypy",
  "typing-extensions",
  "types-docutils",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gp_sphinx"]

[tool.mypy]
strict = true
python_version = "3.10"
files = [
  "src/",
  "tests/",
]

[[tool.mypy.overrides]]
module = ["gp_sphinx.sphinx_fonts"]
disable_error_code = ["attr-defined", "unused-ignore"]

[tool.ruff]
target-version = "py310"

[tool.ruff.lint]
select = [
  "E", # pycodestyle
  "F", # pyflakes
  "I", # isort
  "UP", # pyupgrade
  "A", # flake8-builtins
  "B", # flake8-bugbear
  "C4", # flake8-comprehensions
  "COM", # flake8-commas
  "EM", # flake8-errmsg
  "Q", # flake8-quotes
  "PTH", # flake8-use-pathlib
  "SIM", # flake8-simplify
  "TRY", # Trycertatops
  "PERF", # Perflint
  "RUF", # Ruff-specific rules
  "D", # pydocstyle
  "FA100",  # future annotations
]
ignore = [
  "COM812", # missing trailing comma, ruff format conflict
]
extend-safe-fixes = [
  "UP006",
  "UP007",
]
pyupgrade.keep-runtime-typing = false

[tool.ruff.lint.isort]
known-first-party = [
  "gp_sphinx",
]
combine-as-imports = true
required-imports = [
  "from __future__ import annotations",
]

[tool.ruff.lint.pydocstyle]
convention = "numpy"

[tool.ruff.lint.per-file-ignores]
"*/__init__.py" = ["F401"]

[tool.pytest.ini_options]
addopts = "--tb=short --no-header --showlocals --doctest-modules"
doctest_optionflags = "ELLIPSIS NORMALIZE_WHITESPACE"
testpaths = [
  "tests",
  "docs",
  "src",
]
filterwarnings = [
  "ignore:distutils Version classes are deprecated. Use packaging.version instead.",
  "ignore:The frontend.Option(Parser)? class.*:DeprecationWarning::",
]

[tool.coverage.report]
exclude_also = [
  "def __repr__",
  "raise AssertionError",
  "raise NotImplementedError",
  "if __name__ == .__main__.:",
  "if TYPE_CHECKING:",
  "if t.TYPE_CHECKING:",
  "class .*\\bProtocol\\):",
  "@(abc\\.)?abstractmethod",
  "from __future__ import annotations",
]
