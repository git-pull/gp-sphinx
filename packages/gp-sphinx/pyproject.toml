[project]
name = "gp-sphinx"
version = "0.0.1a0"
description = "Shared Sphinx documentation platform for git-pull projects"
requires-python = ">=3.10,<4.0"
authors = [
  {name = "Tony Narlock", email = "tony@git-pull.com"}
]
license = { text = "MIT" }
classifiers = [
  "Development Status :: 3 - Alpha",
  "License :: OSI Approved :: MIT License",
  "Framework :: Sphinx",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Topic :: Documentation",
  "Topic :: Documentation :: Sphinx",
]
readme = "README.md"
keywords = ["sphinx", "documentation", "configuration"]
dependencies = [
  "sphinx<9",
  "sphinx-gptheme==0.0.1a0",
  "sphinx-fonts==0.0.1a0",
  "myst-parser",
  "docutils",
  "sphinx-autodoc-typehints",
  "sphinx-inline-tabs",
  "sphinx-copybutton",
  "sphinxext-opengraph",
  "sphinxext-rediraffe",
  "sphinx-design",
  "linkify-it-py",
  "gp-libs",
]

[project.optional-dependencies]
argparse = [
  "sphinx-argparse-neo==0.0.1a0",
]

[project.urls]
"Bug Tracker" = "https://github.com/git-pull/gp-sphinx/issues"
Documentation = "https://gp-sphinx.git-pull.com"
Repository = "https://github.com/git-pull/gp-sphinx"
Changes = "https://github.com/git-pull/gp-sphinx/blob/master/CHANGES"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gp_sphinx"]
