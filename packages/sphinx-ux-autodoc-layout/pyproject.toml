[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sphinx-ux-autodoc-layout"
version = "0.0.1a21"
description = "Componentized layout for Sphinx autodoc output"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
authors = [
  {name = "Tony Narlock", email = "tony@git-pull.com"}
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "License :: OSI Approved :: MIT License",
  "Framework :: Sphinx",
  "Framework :: Sphinx :: Extension",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Topic :: Documentation",
  "Topic :: Documentation :: Sphinx",
  "Typing :: Typed",
]
dependencies = ["sphinx>=8.1"]

[tool.hatch.build.targets.wheel]
packages = ["src/sphinx_ux_autodoc_layout"]

[tool.gp-sphinx.docs]
# Layout presenter consumed by every autodoc-* extension; five
# workspace packages depend on it. Surfacing those dependents from
# this package's own landing helps a reader navigate downstream.
showcase = ["dependents"]
