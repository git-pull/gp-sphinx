[project]
name = "sphinx-autodoc-fastmcp"
version = "0.0.1a11"
description = "Sphinx extension for documenting FastMCP tools (cards, badges, cross-refs)"
requires-python = ">=3.10,<4.0"
authors = [
  {name = "Tony Narlock", email = "tony@git-pull.com"}
]
license = { text = "MIT" }
classifiers = [
  "Development Status :: 3 - Alpha",
  "License :: OSI Approved :: MIT License",
  "Framework :: Sphinx",
  "Framework :: Sphinx :: Extension",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Topic :: Documentation",
  "Topic :: Documentation :: Sphinx",
  "Typing :: Typed",
]
readme = "README.md"
keywords = ["sphinx", "fastmcp", "mcp", "documentation", "badges"]
dependencies = [
  "sphinx>=8.1",
  "sphinx-ux-badges==0.0.1a11",
  "sphinx-ux-autodoc-layout==0.0.1a11",
  "sphinx-autodoc-typehints-gp==0.0.1a11",
]

[project.urls]
Repository = "https://github.com/git-pull/gp-sphinx"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sphinx_autodoc_fastmcp"]
