[project]
name = "gp-furo-theme"
version = "0.0.1a18"
description = "Tailwind v4 port of the Furo Sphinx theme for git-pull project documentation"
requires-python = ">=3.10,<4.0"
authors = [
  {name = "Tony Narlock", email = "tony@git-pull.com"}
]
license = { text = "MIT" }
classifiers = [
  "Development Status :: 3 - Alpha",
  "License :: OSI Approved :: MIT License",
  "Framework :: Sphinx",
  "Framework :: Sphinx :: Theme",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Topic :: Documentation",
  "Topic :: Documentation :: Sphinx",
  "Typing :: Typed",
]
readme = "README.md"
keywords = ["sphinx", "theme", "furo", "tailwind", "documentation"]
dependencies = [
  "sphinx>=8.1",
  "sphinx-basic-ng>=1.0.0b2",
  "beautifulsoup4",
  "pygments",
  # Provides the `a11y-light` / `a11y-dark` styles theme.conf
  # references; used to be a transitive of `furo`.
  "accessible-pygments>=0.0.5",
]

[project.entry-points."sphinx.html_themes"]
"gp-furo" = "gp_furo_theme"

[project.urls]
Repository = "https://github.com/git-pull/gp-sphinx"

[build-system]
# `sphinx_vite_builder.build` runs `pnpm exec vite build` before
# delegating to hatchling, so the wheel/sdist always contains the
# vite-built static assets even though `static/` is gitignored. The
# backend short-circuits when `web/` is absent (unpacked-sdist case
# downstream of `pip install <wheel-from-sdist>`), so end users do
# not need pnpm or Node тАФ the sdist already carries pre-baked assets.
#
# `sphinx-vite-builder` is a workspace member; the workspace-level
# `[tool.uv.sources]` entry redirects this requires-dependency to the
# in-tree path under `packages/sphinx-vite-builder/` rather than
# resolving it from PyPI (where it isn't published yet).
requires = ["hatchling", "sphinx-vite-builder"]
build-backend = "sphinx_vite_builder.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gp_furo_theme"]

[tool.hatch.build.targets.sdist]
# Exclude the JS source tree from the sdist. The vite-built `static/`
# tree is shipped via `artifacts` below тАФ that's the only thing
# downstream `pip install <sdist>` needs. Without this exclude, the
# sdist would balloon to multi-megabyte (web/node_modules/ leaks in
# under hatchling's default file selection because workspace-level
# .gitignore patterns aren't honored at the package level), and the
# wheel-from-sdist chain would re-run vite against an unpacked
# `web/node_modules/` whose internal paths are stale.
exclude = ["web/"]

# `artifacts` is hatchling's documented "VCS-ignored include" mechanism:
# patterns listed here override the default gitignore-aware file
# selection. Because the backend runs vite *before* hatchling's file
# selection runs, the `static/` tree is always populated by then.
# Unlike `force-include`, `artifacts` does not crash on a missing path
# at config-parse time тАФ it just "treat-as-not-ignored" patterns at
# file-selection time. See:
#   https://hatch.pypa.io/latest/config/build/#artifacts
[tool.hatch.build]
artifacts = ["src/gp_furo_theme/theme/gp-furo/static/"]

[tool.gp-sphinx.docs]
# Substantive public Python API (nine callables: theme path,
# pygments helpers, etc.) plus one workspace dependent. Showcase
# both: the signatures page surfaces type drift between source and
# docstring (rendered by {live-signature}), the dependents page
# links to consumers (rendered by {package-dependents}). The keys
# below name the subpage filenames, not the directive names.
showcase = ["signatures", "dependents"]
