[project]
name = "sphinx-ux-badges"
version = "0.0.1a26"
description = "Shared badge node and CSS for Sphinx autodoc extensions"
requires-python = ">=3.10,<4.0"
authors = [
  {name = "Tony Narlock", email = "tony@git-pull.com"}
]
license = { text = "MIT" }
classifiers = [
  "Development Status :: 3 - Alpha",
  "License :: OSI Approved :: MIT License",
  "Framework :: Sphinx",
  "Framework :: Sphinx :: Extension",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Topic :: Documentation",
  "Topic :: Documentation :: Sphinx",
  "Typing :: Typed",
]
readme = "README.md"
keywords = ["sphinx", "badges", "documentation"]
dependencies = [
  "sphinx>=8.1",
]

[project.urls]
Repository = "https://github.com/git-pull/gp-sphinx"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sphinx_ux_badges"]

[tool.gp-sphinx.docs]
# Five workspace packages depend on sphinx-ux-badges (every autodoc-*
# extension consumes the SAB palette); the dependents subpage makes
# that fan-out discoverable from the package's own landing.
showcase = ["dependents"]
