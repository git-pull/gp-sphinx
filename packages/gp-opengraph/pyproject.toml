[project]
name = "gp-opengraph"
version = "0.0.1a9"
description = "OpenGraph and Twitter meta-tag emission for Sphinx — matplotlib-free"
requires-python = ">=3.10,<4.0"
authors = [
  {name = "Tony Narlock", email = "tony@git-pull.com"}
]
license = { text = "MIT" }
classifiers = [
  "Development Status :: 3 - Alpha",
  "License :: OSI Approved :: MIT License",
  "Framework :: Sphinx",
  "Framework :: Sphinx :: Extension",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Topic :: Documentation",
  "Topic :: Documentation :: Sphinx",
  "Typing :: Typed",
]
readme = "README.md"
keywords = ["sphinx", "opengraph", "meta", "social", "documentation"]
dependencies = [
  "sphinx>=8.1",
]

[project.urls]
Repository = "https://github.com/git-pull/gp-sphinx"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gp_opengraph"]
