[project]
name = "sphinx-autodoc-argparse"
version = "0.0.1a30"
description = "Modern Sphinx extension for documenting argparse-based CLI tools"
requires-python = ">=3.10,<4.0"
authors = [
  {name = "Tony Narlock", email = "tony@git-pull.com"}
]
license = { text = "MIT" }
classifiers = [
  "Development Status :: 3 - Alpha",
  "License :: OSI Approved :: MIT License",
  "Framework :: Sphinx",
  "Framework :: Sphinx :: Domain",
  "Framework :: Sphinx :: Extension",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Topic :: Documentation",
  "Topic :: Documentation :: Sphinx",
  "Topic :: Software Development :: Documentation",
  "Typing :: Typed",
]
readme = "README.md"
keywords = ["sphinx", "argparse", "cli", "documentation"]
dependencies = [
  "sphinx>=8.1",
  "pygments",
  "docutils",
]

[project.urls]
Repository = "https://github.com/git-pull/gp-sphinx"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sphinx_autodoc_argparse"]

[tool.gp-sphinx.docs]
# argparse extension registers the {argparse} directive plus four
# config values; the kitchen-sink page exercises the directive once
# so a reader can see what an invocation looks like end-to-end.
showcase = ["kitchen-sink"]
